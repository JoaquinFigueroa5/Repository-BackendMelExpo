services:
  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: REMA
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "mysql://4W6ZioAwdCi8nLH.root:3llZ4rl2j5kfZLGL@gateway01.us-east-1.prod.aws.tidbcloud.com:4000/sys"
      JWT_SECRET: "rema-jwt-secret-key-change-in-production"
      JWT_EXPIRES_IN: "24h"
      NODE_ENV: "production"
      FRONTEND_URL: "http://localhost:5173"
      EMAIL_HOST: "smtp-relay.brevo.com"
      EMAIL_PORT: 587
      EMAIL_USER: "${EMAIL_USER}"
      EMAIL_PASS: "${EMAIL_PASS}"
      EMAIL_FROM: "${EMAIL_FROM}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
